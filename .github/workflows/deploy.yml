name: Deploy API Gateway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Zip application
        run: |
          cd api-gateway-railway
          zip -r ../app.zip .

      - name: Deploy to production
        run: |
          az webapp deploy --name jdo-api-gateway --resource-group rg-jdo-api-gateway --src-path app.zip --type zip