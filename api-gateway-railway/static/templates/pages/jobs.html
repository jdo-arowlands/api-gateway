<div id="page-jobs" class="page" style="display:none">
  <div class="topbar">
    <h2>Scheduled Jobs</h2>
    <div class="topbar-actions">
      <button class="btn btn-primary" onclick="openJobModal()">+ New Job</button>
    </div>
  </div>
  <div class="content">
    <div class="table-wrap">
      <div class="table-header">
        <h3>Job Definitions</h3>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Schedule/Trigger</th>
            <th>Action</th>
            <th>Last Run</th>
            <th>Runs</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="jobs-body">
          <tr>
            <td colspan="8" class="muted" style="text-align:center;padding:40px">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
