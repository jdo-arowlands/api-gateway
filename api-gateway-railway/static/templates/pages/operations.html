<div id="page-operations" class="page" style="display:none">
  <div class="topbar">
    <h2>API Operations</h2>
    <div class="topbar-actions">
      <button class="btn btn-primary" onclick="openOperationModal()">+ Add Operation</button>
    </div>
  </div>
  <div class="content">
    <p class="muted" style="margin-bottom:16px">
      Named API operations — configurable paths and default params per endpoint,
      so paths aren't hardcoded in Python.
    </p>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Endpoint</th>
            <th>Method</th>
            <th>Path</th>
            <th>Default Params</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="operations-body">
          <tr>
            <td colspan="7" class="muted" style="text-align:center;padding:40px">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
