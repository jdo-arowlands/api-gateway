<div id="page-endpoints" class="page" style="display:none">
  <div class="topbar">
    <h2>API Endpoints</h2>
    <div class="topbar-actions">
      <button class="btn btn-primary" onclick="openEndpointModal()">+ New Endpoint</button>
    </div>
  </div>
  <div class="content">
    <div class="table-wrap">
      <div class="table-header">
        <h3>Configured Connections</h3>
        <div class="filter-bar">
          <select id="endpoint-project-filter" onchange="renderEndpoints()" style="width:170px">
            <option value="">All projects</option>
          </select>
          <div class="search-wrap">
            <span class="icon">🔍</span>
            <input type="text" id="endpoint-search" placeholder="Search endpoints..." oninput="renderEndpoints()">
          </div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Project</th>
            <th>Base URL</th>
            <th>Auth</th>
            <th>Token Expires</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="endpoints-body">
          <tr>
            <td colspan="7" class="muted" style="text-align:center;padding:40px">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
