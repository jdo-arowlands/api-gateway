<div id="page-job-runs" class="page" style="display:none">
  <div class="topbar">
    <h2>Job Run History</h2>
  </div>
  <div class="content">
    <div class="table-wrap">
      <div class="table-header">
        <h3>All Runs</h3>
        <button class="btn btn-ghost btn-sm" onclick="loadJobRuns()">↺</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Job</th>
            <th>Triggered By</th>
            <th>Duration</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="job-runs-body">
          <tr>
            <td colspan="6" class="muted" style="text-align:center;padding:40px">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
