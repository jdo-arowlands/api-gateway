<div id="page-settings" class="page" style="display:none">
  <div class="topbar">
    <h2>Settings</h2>
  </div>
  <div class="content" style="max-width:600px">

    <!-- App Settings -->
    <div class="table-wrap" style="margin-bottom:20px">
      <div class="table-header">
        <h3>Application Settings</h3>
      </div>
      <div id="settings-list" style="padding:16px;display:flex;flex-direction:column;gap:12px">
        <div class="muted">Loading...</div>
      </div>
      <div style="padding:16px;border-top:1px solid var(--border)">
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Add new setting</p>
        <div style="display:flex;gap:8px">
          <input id="new-key" placeholder="Key" style="flex:1">
          <input id="new-val" placeholder="Value" style="flex:2">
          <button class="btn btn-primary" onclick="saveSetting()">Save</button>
        </div>
      </div>
    </div>

    <!-- Retell Event → Job Map -->
    <div class="table-wrap">
      <div class="table-header">
        <h3>Retell AI Event → Job Map</h3>
      </div>
      <div style="padding:16px">
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
          These event types are handled in
          <code style="font-family:var(--mono);font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:3px">
            backend/webhooks.py → RETELL_EVENTS_TO_JOBS
          </code>
        </p>
        <table>
          <thead>
            <tr>
              <th>Retell Event</th>
              <th>Job Name</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="mono">call_ended</td>
              <td class="mono">retell_call_ended</td>
            </tr>
            <tr>
              <td class="mono">call_analyzed</td>
              <td class="mono">retell_call_analyzed</td>
            </tr>
            <tr>
              <td class="mono">call_started</td>
              <td class="mono">retell_call_started</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
